<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Panda — My Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- top nav bar -->
<nav class="navbar">
    <a href="index.html" class="brand">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M8 9a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2"/>
            <path d="M12 9a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2"/>
            <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
            <line x1="9" y1="10" x2="9" y2="10.01"/>
            <line x1="15" y1="10" x2="15" y2="10.01"/>
        </svg>
        3 Panda
    </a>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <span id="dynamic-nav"></span>
        <li><a href="login.html" class="btn-nav" id="nav-auth-btn">Login</a></li>
    </ul>
</nav>

<!-- profile section -->
<div class="container-sm">
    <div id="status-msg" class="status-msg"></div>

    <div class="auth-card">
        <h2>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:.4rem;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            My Profile
        </h2>

        <div class="text-center mb-2">
            <img id="profile-img" class="profile-pic profile-pic-lg" style="margin:0 auto;" src="images/profiles/default.png"
                 onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22140%22 height=%22140%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%23C62828%22 stroke-width=%221.5%22%3E%3Ccircle cx=%2212%22 cy=%227%22 r=%224%22/%3E%3Cpath d=%22M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2%22/%3E%3C/svg%3E'" alt="Profile">
        </div>

        <form id="profile-form" enctype="multipart/form-data">
            <div class="form-group">
                <label for="profile-name">Username</label>
                <input type="text" id="profile-name" class="form-control" placeholder="Your username">
            </div>
            <div class="form-group">
                <label for="profile-email">Email</label>
                <input type="email" id="profile-email" class="form-control" placeholder="you@email.com">
            </div>
            <div class="form-group">
                <label for="profile-fullname">Full Name</label>
                <input type="text" id="profile-fullname" class="form-control" placeholder="John Doe">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="profile-phone">Phone</label>
                    <input type="text" id="profile-phone" class="form-control" placeholder="+1 234 567 890">
                </div>
                <div class="form-group">
                    <label for="profile-address">Address</label>
                    <input type="text" id="profile-address" class="form-control" placeholder="123 Main St">
                </div>
            </div>
            <div class="form-group">
                <label for="profile-password">New Password <span class="text-muted" style="font-weight:400;">(leave blank to keep current)</span></label>
                <input type="password" id="profile-password" class="form-control" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label for="profile-pic-input">Profile Picture</label>
                <input type="file" id="profile-pic-input" class="form-control" accept="image/*">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                Save Changes
            </button>
        </form>
    </div>
</div>

<!-- footer area -->
<footer class="site-footer">
    <div class="footer-inner">
        <div class="footer-brand">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 9a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2"/><path d="M12 9a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="10" x2="9" y2="10.01"/><line x1="15" y1="10" x2="15" y2="10.01"/></svg>
            <span>3 Panda</span>
        </div>
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="profile.html">Profile</a>
        </div>
        <p class="footer-copy">&copy; 2025 3 Panda Food Delivery. All rights reserved.</p>
    </div>
</footer>
<div id="toast-container"></div>

<script src="app.js"></script>
</body>
</html>
