<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Panda — My Orders</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- top nav bar -->
<nav class="navbar">
    <a href="index.html" class="brand">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M8 9a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2"/>
            <path d="M12 9a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2"/>
            <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
            <line x1="9" y1="10" x2="9" y2="10.01"/>
            <line x1="15" y1="10" x2="15" y2="10.01"/>
        </svg>
        3 Panda
    </a>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <span id="dynamic-nav"></span>
        <li><a href="login.html" class="btn-nav" id="nav-auth-btn">Login</a></li>
    </ul>
</nav>

<!-- my orders section -->
<div class="container">
    <h2 class="section-title">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        My Orders
    </h2>

    <div id="status-msg" class="status-msg"></div>

    <div id="orders-list">
        <div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
            <p>You haven't placed any orders yet.</p>
            <a href="index.html" class="btn btn-primary btn-sm mt-2">Browse Menu</a>
        </div>
    </div>
</div>

<!-- order card template (js clones this) -->
<template id="order-card-template">
    <div class="card mb-2">
        <div class="card-body">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;">
                <h3 style="margin:0;">Order #<span class="order-id"></span></h3>
                <span class="badge order-status"></span>
            </div>
            <div class="mt-1">
                <p class="text-muted" style="font-size:.85rem;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:.2rem;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Delivery: <span class="order-delivery">Not assigned</span>
                </p>
            </div>
            <div class="table-wrap mt-1">
                <table>
                    <thead><tr><th>Item</th><th>Qty</th><th>Price</th></tr></thead>
                    <tbody class="order-items"></tbody>
                </table>
            </div>
            <div style="display:flex;justify-content:flex-end;margin-top:.75rem;">
                <strong class="order-total" style="color:var(--red);"></strong>
            </div>
        </div>
    </div>
</template>

<!-- footer area -->
<footer class="site-footer">
    <div class="footer-inner">
        <div class="footer-brand">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 9a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2"/><path d="M12 9a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="10" x2="9" y2="10.01"/><line x1="15" y1="10" x2="15" y2="10.01"/></svg>
            <span>3 Panda</span>
        </div>
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="profile.html">Profile</a>
        </div>
        <p class="footer-copy">&copy; 2025 3 Panda Food Delivery. All rights reserved.</p>
    </div>
</footer>
<div id="toast-container"></div>

<script src="app.js"></script>
</body>
</html>
