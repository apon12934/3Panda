<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Panda — Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- top nav bar -->
<nav class="navbar">
    <a href="index.html" class="brand">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M8 9a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2"/>
            <path d="M12 9a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2"/>
            <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
            <line x1="9" y1="10" x2="9" y2="10.01"/>
            <line x1="15" y1="10" x2="15" y2="10.01"/>
        </svg>
        3 Panda
    </a>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <span id="dynamic-nav"></span>
        <li><a href="login.html" class="btn-nav" id="nav-auth-btn">Login</a></li>
    </ul>
</nav>

<!-- login + register section -->
<div class="container-sm">
    <div id="status-msg" class="status-msg"></div>

    <!-- login form -->
    <div class="auth-card" id="login-card">
        <h2>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:.4rem;"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            Sign In
        </h2>
        <form id="login-form">
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" class="form-control" placeholder="you@email.com" required>
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
        </form>
        <p class="auth-toggle">
            Don't have an account? <a href="#" id="show-register">Register here</a>
        </p>
    </div>

    <!-- register form -->
    <div class="auth-card hidden" id="register-card">
        <h2>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:.4rem;"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
            Create Account
        </h2>
        <form id="register-form">
            <div class="form-group">
                <label for="reg-name">Username</label>
                <input type="text" id="reg-name" class="form-control" placeholder="pandauser" required>
            </div>
            <div class="form-group">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" class="form-control" placeholder="you@email.com" required>
            </div>
            <div class="form-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" class="form-control" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label for="reg-role">I am a</label>
                <select id="reg-role" class="form-control">
                    <option value="customer">Customer</option>
                    <option value="delivery">Delivery Rider</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Register</button>
        </form>
        <p class="auth-toggle">
            Already have an account? <a href="#" id="show-login">Sign in here</a>
        </p>
    </div>
</div>

<!-- footer area -->
<footer class="site-footer">
    <div class="footer-inner">
        <div class="footer-brand">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 9a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2"/><path d="M12 9a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="10" x2="9" y2="10.01"/><line x1="15" y1="10" x2="15" y2="10.01"/></svg>
            <span>3 Panda</span>
        </div>
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="profile.html">Profile</a>
        </div>
        <p class="footer-copy">&copy; 2025 3 Panda Food Delivery. All rights reserved.</p>
    </div>
</footer>
<div id="toast-container"></div>

<script src="app.js"></script>
</body>
</html>
