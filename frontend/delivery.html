<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Panda — Delivery Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

<!-- top nav bar -->
<nav class="navbar">
    <a href="index.html" class="brand">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M8 9a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2"/>
            <path d="M12 9a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2"/>
            <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
            <line x1="9" y1="10" x2="9" y2="10.01"/>
            <line x1="15" y1="10" x2="15" y2="10.01"/>
        </svg>
        3 Panda
    </a>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <span id="dynamic-nav"></span>
        <li><a href="login.html" class="btn-nav" id="nav-auth-btn">Login</a></li>
    </ul>
</nav>

<!-- delivery dashboard section -->
<div class="container">
    <h2 class="section-title">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        Delivery Dashboard
    </h2>

    <div id="status-msg" class="status-msg"></div>

    <!-- tab buttons -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="pending-tab">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:.3rem;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Pending Orders
        </button>
        <button class="tab-btn" data-tab="history-tab">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:.3rem;"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            Delivery History
        </button>
        <button class="tab-btn" data-tab="map-tab">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:.3rem;"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            Map View
        </button>
    </div>

    <!-- pending orders tab -->
    <div class="tab-panel active" id="pending-tab">
        <div id="pending-orders">
            <div class="empty-state">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <p>No pending orders right now.</p>
            </div>
        </div>
    </div>

    <!-- history tab -->
    <div class="tab-panel" id="history-tab">
        <div id="history-orders">
            <div class="empty-state">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                <p>No deliveries completed yet.</p>
            </div>
        </div>
    </div>

    <!-- map tab -->
    <div class="tab-panel" id="map-tab">
        <p class="text-muted mb-1" style="font-size:.85rem;">Delivery locations are shown on the map.</p>
        <div id="delivery-map" class="map-box" style="height:450px;"></div>
    </div>
</div>

<!-- template card used for a delivery order -->
<template id="delivery-order-template">
    <div class="card mb-2">
        <div class="card-body">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;">
                <h3 style="margin:0;">Order #<span class="order-id"></span></h3>
                <span class="badge order-status"></span>
            </div>
            <p class="text-muted mt-1" style="font-size:.85rem;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:.2rem;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Customer: <span class="order-customer"></span>
            </p>
            <p class="text-muted" style="font-size:.85rem;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:.2rem;"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                Location: <span class="order-coords"></span>
            </p>
            <div class="table-wrap mt-1">
                <table>
                    <thead><tr><th>Item</th><th>Qty</th><th>Price</th></tr></thead>
                    <tbody class="order-items"></tbody>
                </table>
            </div>
            <div class="gap-row mt-1" style="justify-content:flex-end;">
                <select class="form-control order-status-select" style="width:auto;">
                    <option value="">Change status…</option>
                    <option value="confirmed">Confirmed</option>
                    <option value="preparing">Preparing</option>
                    <option value="out_for_delivery">Out for Delivery</option>
                    <option value="delivered">Delivered</option>
                    <option value="cancelled">Cancelled</option>
                </select>
                <button class="btn btn-primary btn-sm update-status-btn">Update</button>
            </div>
        </div>
    </div>
</template>

<!-- footer area -->
<footer class="site-footer">
    <div class="footer-inner">
        <div class="footer-brand">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 9a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2"/><path d="M12 9a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="10" x2="9" y2="10.01"/><line x1="15" y1="10" x2="15" y2="10.01"/></svg>
            <span>3 Panda</span>
        </div>
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="profile.html">Profile</a>
        </div>
        <p class="footer-copy">&copy; 2025 3 Panda Food Delivery. All rights reserved.</p>
    </div>
</footer>
<div id="toast-container"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
