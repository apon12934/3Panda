services:
  - type: web
    name: threepanda
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true

  - type: cron
    name: threepanda-keepalive
    env: node
    plan: free
    rootDir: backend
    schedule: "*/14 * * * *"
    buildCommand: npm install
    startCommand: node keepalive.js
    envVars:
      - key: KEEPALIVE_URL
        value: https://3panda.ddns.net/api/health
      - key: KEEPALIVE_FALLBACK_URL
        value: https://threepanda.onrender.com/api/health
